name: Keep Studio Awake

on:
  schedule:
    # Run every 55 minutes — wakes the studio before it auto-sleeps (10 min threshold)
    - cron: '*/55 * * * *'
  workflow_dispatch:  # Manual trigger option

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Touch timestamp file
        run: |
          date >> pulse.log
          echo "Studio wake pulse at $(date)" >> pulse.log
          git config --local user.email "hermes@creator-prompts.bot"
          git config --local user.name "Hermes Keep-Alive"
          git add pulse.log
          git commit -m "Keep studio awake pulse - $(date)" --allow-empty

      - name: Push to trigger Lightning AI sync
        uses: ad-m/github-push-action@v0.7.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true