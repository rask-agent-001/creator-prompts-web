name: Wake Studio

on:
  repository_dispatch:
    types: [studio_went_to_sleep]

  schedule:
    - cron: '0 */3 * * *'

jobs:
  wake-studio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for studio to fully shut down
        run: sleep 60

      - name: Install lightning-sdk and wake studio
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          pip install lightning-sdk -q
          python3 wake_studio.py